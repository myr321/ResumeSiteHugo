  - name: CUDA 注意力前向计算
    role: 个人项目
    period: 2024.09 - 2025.01
    context: 高性能计算
    stack: C++, CUDA, Python, PyTorch C++ 扩展
    links:
      - label: GitHub
        url: https://github.com/myr321/GPU-accelerated-Attention
    bullets:
      - 基于 PyTorch C++ 扩展与 CUDA 实现 Scaled Dot-Product Attention 前向计算，完成 naive、tiled 和 fused Softmax 加 P@V 三类自定义 kernel，并编写测试与绘图脚本，系统比较不同优化策略的性能收益。
      - 针对注意力计算的两个阶段，引入 shared memory tiling 和 warp-level reduction 两类优化，并设计融合 Softmax 加 P@V 的 kernel，减少中间内存访问开销。
      - 使用 Python 构建正确性校验与性能测试流程，在 RTX 2060 SUPER 环境下对多组输入完成 benchmark，最佳自定义实现相较 CPU baseline 取得约 3 倍加速。

