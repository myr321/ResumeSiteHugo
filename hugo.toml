baseURL = 'https://myr321.github.io/ResumeSiteHugo/'
title = 'Youran Ma'
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
disableKinds = ['taxonomy', 'term', 'RSS']
hasCJKLanguage = true

[markup]
  [markup.goldmark.renderer]
    unsafe = true

[params]
  author = 'Youran Ma'

[languages]
  [languages.en]
    languageCode = 'en-US'
    languageName = 'English'
    contentDir = 'content/en'
    weight = 1
    title = 'Youran Ma | Resume'
    [languages.en.params]
      description = 'Resume site for Youran Ma, a software engineer focused on backend systems, product delivery, and AI-enabled applications.'

  [languages.zh]
    languageCode = 'zh-CN'
    languageName = '中文'
    contentDir = 'content/zh'
    weight = 2
    title = '马悠然 | 简历'
    [languages.zh.params]
      description = '马悠然的双语简历网站，聚焦后端开发、系统实现、产品交付与 AI 应用工程。'
